version = 1
name = "zoteroagent"

[setup]
script = """
if (Test-Path package.json) {
  npm install
} elseif (Test-Path requirements.txt) {
  python -m pip install -r requirements.txt
} elseif (Test-Path pyproject.toml) {
  python -m pip install -e .
} else {
  Write-Host "No dependency manifest found; setup skipped."
}
"""

[[actions]]
name = "Status"
icon = "run"
command = "git status --short"

[[actions]]
name = "Test"
icon = "run"
command = "if (Test-Path package.json) { npm test } elseif (Test-Path requirements.txt -or Test-Path pyproject.toml) { python -m pytest } else { Write-Host 'No test command configured yet.' }"
