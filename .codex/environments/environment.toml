version = 1
name = "zoteroagent"

[setup]
script = '''
if [ -f package.json ]; then
  npm install
elif [ -f requirements.txt ]; then
  python -m pip install -r requirements.txt
elif [ -f pyproject.toml ]; then
  python -m pip install -e .
else
  echo "No dependency manifest found; setup skipped."
fi
'''

[[actions]]
name = "Status"
icon = "run"
command = "git status --short"

[[actions]]
name = "Test"
icon = "run"
command = "if [ -f package.json ]; then npm test; elif [ -f requirements.txt ] || [ -f pyproject.toml ]; then python -m pytest; else echo 'No test command configured yet.'; fi"
